<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Library</title>
    <link rel="stylesheet" href="styles.css" />
</head>

<body>
    <div class="container" id="library-container">

        <div class="header">
            <h1>Library</h1>
            <button id="add_book_btn">Add book</button>
        </div>
        <dialog class="modal-overlay " id="add_book_dialog">
            <div class="modal">
                <div class="modal-header">
                    <h2>Add a book</h2> <button id="close_book_dialog">X</button>
                </div>
                <form action="" id="book-form">
                    <div class="modal-body">
                        <div class="field">
                            <label for="title">Title:</label>
                            <input type="text" id="title" placeholder="e.g The Pragmatic Programmer" required>
                        </div>
                        <div class="field">
                            <label for="author">Author:</label>
                            <input type="text" id="author" placeholder="e.g Dave Thomas" required>
                        </div>
                        <div class="field">
                            <label for="pages">Pages:</label>
                            <input type="number" id="pages" placeholder="e.g. 352" required>
                        </div>
                        <div class="checkbox-row">
                            <input type="checkbox" id="read">
                            <label for="read">Already read</label>
                        </div>


                    </div>
                    <div class="modal-footer">
                        <button type="reset" id="cancel-btn">
                            Cancel
                        </button>
                        <button type="submit" id="submit">Submit</button>
                    </div>
                </form>
            </div>
        </dialog>
        <div id="books-section"></div>


    </div>


    <script src="library.js"></script>
</body>

</html>
